name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://dtrofhxpazhnobhjrjmu.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_VIi-wRypp7djOjcXoBpLDQ_IEUtJVdc' }}
      VITE_PUBLIC_APP_URL: ${{ vars.VITE_PUBLIC_APP_URL || 'https://planify-5a976.web.app' }}
      VITE_MARKETING_URL: ${{ vars.VITE_MARKETING_URL || 'https://planify-5a976.web.app' }}
      VITE_LOGISTIQUE_APP_URL: ${{ vars.VITE_LOGISTIQUE_APP_URL || 'https://planify-5a976-logistique.web.app' }}
      VITE_FACTURATION_APP_URL: ${{ vars.VITE_FACTURATION_APP_URL || 'https://planify-5a976-facturation.web.app' }}
      VITE_ADMINISTRATION_APP_URL: ${{ vars.VITE_ADMINISTRATION_APP_URL || 'https://planify-5a976-administration.web.app' }}
      VITE_POC_WORKSPACE_PARAM_ENABLED: ${{ vars.VITE_POC_WORKSPACE_PARAM_ENABLED || 'true' }}
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PLANIFY_5A976 }}
          channelId: live
          projectId: planify-5a976
